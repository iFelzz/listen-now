version: "3.9"

services:
  listen-now:
    # Ganti 'image' menjadi 'build: .' agar Portainer merakit sendiri dari Dockerfile
    build: .
    container_name: listen-now-container
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount hanya folder downloads agar MP3 tersimpan di host
      - ./downloads:/app/downloads
    # Hapus opsi --reload karena ini sudah masuk fase Production
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
